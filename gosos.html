<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gosos</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Montserrat', sans-serif;
    background: #e8edf2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
    gap: 40px;
  }

  h1 {
    font-size: 2rem;
    color: #1a2e44;
    font-weight: 800;
  }

  .buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
  }

  .btn {
    display: inline-block;
    background: #0073FF;
    color: white;
    text-decoration: none;
    border-radius: 12px;
    padding: 18px 36px;
    font-family: 'Montserrat', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    transition: background 0.2s, transform 0.1s;
  }
  .btn:hover {
    background: #155a91;
    transform: translateY(-2px);
  }
</style>
</head>
<body>
  <h1>Gosos</h1>
  <div class="buttons">
    <a href="gosos/canine.html" class="btn">Canine Companions Certificate</a>
  </div>
</body>
</html>
